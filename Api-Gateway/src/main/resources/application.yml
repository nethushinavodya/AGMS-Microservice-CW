server:
  port: ${SERVER_PORT:${PORT:8082}}

spring:
  # Import configuration from the local Config Server (optional: so gateway still starts if Config Server is down)
  config:
    import: "optional:configserver:http://localhost:8888"

  application:
    name: api-gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka