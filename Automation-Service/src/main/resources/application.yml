server:
  port: ${SERVER_PORT:${PORT:8085}}
  shutdown: graceful

spring:
  application:
    name: AUTOMATION-SERVICE

  datasource:
    url: jdbc:mysql://localhost:3306/automation_db
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  lifecycle:
    timeout-per-shutdown-phase: 30s

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/