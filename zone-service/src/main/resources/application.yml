server:
  port: 8081

spring:
  application:
    name: zone-service

  datasource:
    # Permanent MySQL JDBC configuration
    url: jdbc:mysql://localhost:3306/zone_db
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 1234

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    # let Hibernate autodetect the dialect based on JDBC driver

h2:
  console:
    enabled: true
    path: /h2-console

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka