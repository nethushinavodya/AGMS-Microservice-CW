server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:

      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      routes:

        - id: zone-service
          uri: lb://ZONE-SERVICE
          predicates:
            - Path=/api/zones/**

        - id: sensor-telemetry-service
          uri: lb://SENSOR-TELEMETRY-SERVICE
          predicates:
            - Path=/api/sensors/**

        - id: automation-service
          uri: lb://AUTOMATION-SERVICE
          predicates:
            - Path=/api/automation/**

        - id: crop-inventory-service
          uri: lb://CROP-INVENTORY-SERVICE
          predicates:
            - Path=/api/crops/**

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true

    service-url:
      defaultZone: http://localhost:8761/eureka/

  instance:
    prefer-ip-address: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG